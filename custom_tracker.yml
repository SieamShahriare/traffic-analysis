tracker_type: bytetrack
track_high_thresh: 0.5  # threshold for the first association
track_low_thresh: 0.1   # threshold for the second association
new_track_thresh: 0.6   # threshold for initiating a new track
track_buffer: 30        # frames to keep a lost track
match_thresh: 0.8       # threshold for matching tracks
fuse_score: True        # Whether to fuse detection scores with IOU during association
gating_threshold: 0.8   # Filters out unrealistic matches based on distance